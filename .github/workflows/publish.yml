name: Publish to NuGet

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for MinVer

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore SqliteInspector.slnx

      - name: Build
        run: dotnet build SqliteInspector.slnx --no-restore -c Release

      - name: Test
        run: dotnet test SqliteInspector.slnx --no-build -c Release

      - name: Pack
        run: dotnet pack src/SqliteInspector.Maui/SqliteInspector.Maui.csproj -c Release --no-build -o ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./nupkg/*.nupkg
          generate_release_notes: true
